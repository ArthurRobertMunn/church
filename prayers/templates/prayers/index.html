<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
    <head>
        <title>Prayers</title>

        <style>
            nav {
                background-color: #0D6EFD;
            }
            h1 {
                padding: 25px;  
                font-weight: bold; 
                color: white;   
            } 
            #searchText {
                background: #0D6EFD;
                width: 500px;
                font-size: 1.5em;
                color: white;
                font-weight: bold;
                border: none;
                
            }
            #createButton {
                padding: 25px;
                border-radius: 25px; 
                border: none;
                font-weight: bold;
            }
            .table-hover tbody tr:hover td {
                background: #0D6EFD;
            }
            table thead tr th {
                background: #0D6EFD;
            }
            .spinner-wrapper {
                background-color: black;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 9999;
                display: flex;
                justify-content: center;
                align-items: center;
                transition: all 0.2s;
            }
        </style>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    </head>
    <body>

        <div class="text-center">
            <div class="spinner-wrapper">
                <div class="spinner-grow text-primary" style="width: 12rem; height: 12rem;" role="status">
                </div>
            </div>
        </div>

        <nav class="navbar bg-primary" data-bs-theme="dark">
            <h1>Prayers</h1>
            <form method="GET" action="{% url 'search' %}" class="d-flex" role="search">
                <input id="searchText" class="form-control" type="search" placeholder="Search people's favorite prayers" aria-label="Search" name="query">
                <button class="btn btn-outline-primary btn-lg" type="submit"><b>Search</b></button>
            </form>
        </nav>
        
        <div style="padding: 25px;"><a id="createButton" class="btn btn-outline-primary btn-lg" href="{% url 'create' %}" role="button">What is your favorite prayer?</a></div>

        <table class="table table-hover">
            <thead>
                <tr>
                  <th style="background: #0D6EFD;" scope="col">Choose a person to see their favorite prayer</th>
                </tr>
            </thead>
            <tbody>
                {% for person in people %}
                    <tr>
                        <td> 
                            <a class="link-light link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover" href="{% url 'details' person.id %}"> <b>{{ person.name }}</b> </a> &emsp; &emsp; {{ person.email }}
                        </td>
                    </tr>
                {% endfor %}    
            </tbody>
        </table>
        <script type="text/javascript">


            const spinnerWrapper = document.querySelector(".spinner-wrapper");

            window.addEventListener("load", () => {

                setTimeout(() => {
                    spinnerWrapper.style.visibility = "hidden";
                }, 300);
            
            });
        </script>
    </body>

</html>
