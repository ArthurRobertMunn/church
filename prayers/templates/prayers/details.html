<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
    <head>
        <title>Details</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
        <style>
            div {
                padding: 25px;
            }

            div #options {
                padding: 25px;
            }
        </style>
    </head>
    <body>
        <center>
            <div>
                <p>
                    <button class="btn btn-outline-primary btn-lg" type="button" data-bs-toggle="collapse" data-bs-target="#collapseWidthExample" aria-expanded="false" aria-controls="collapseWidthExample">
                        Pray
                    </button>
                </p>
                <div style="min-height: 120px;">
                    <div class="collapse collapse-horizontal" id="collapseWidthExample">
                        <div class="card card-body" style="width: 300px;">
                            {{ person.prayer }}
                        </div>
                    </div>
                </div>
            </div> 
        
            <div id="options">
                <a class="btn btn-primary" href="{% url 'update' person.id %}" role="button">Update Prayer</a>
                <!-- <a class="btn btn-primary" href="{% url 'delete' person.id %}" role="button">Delete Prayer</a> --->
                <a class="btn btn-primary" href="{% url 'index' %}" role="button">Amen</a>
                <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
                Delete Prayer
                </button>
            </div>
        </center>

                <!-- Button trigger modal -->


        <!-- Modal -->
        <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
          <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header">
                <h1 class="modal-title fs-5" id="exampleModalLabel">Are you sure?</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
              </div>
              <div class="modal-body">
                  Are you sure you want to delete this prayer?
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">No</button>
                <a class="btn btn-primary" href="{% url 'delete' person.id %}" role="button">Delete Prayer</a>
              </div>
            </div>
          </div>
        </div>
    </body>
</html>
